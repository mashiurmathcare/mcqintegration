<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math MCQ Exam - Bangla</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        .card {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #timer-container {
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 15px;
        }
        .option-label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: background 0.2s;
        }
        .option-label:hover { background: #f1f1f1; }
        input[type="radio"] { margin-right: 10px; }
        .btn {
            display: block;
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover { background: #2980b9; }
        .hidden { display: none; }
        .correct-ans { color: #27ae60; font-weight: bold; }
        .wrong-ans { color: #c0392b; font-weight: bold; }
        .explanation {
            background: #ecf0f1;
            padding: 10px;
            border-left: 4px solid #3498db;
            margin-top: 10px;
            border-radius: 0 4px 4px 0;
        }
        .graph-img { max-width: 100%; height: auto; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="exam-section">

        <button class="btn" onclick="submitExam()">পরীক্ষা জমা দিন (Submit)</button>
    </div>

    <div id="result-section" class="hidden card">

        <p>সঠিক উত্তর: <span id="correct-q" class="correct-ans"></span></p>

        <h3>প্রাপ্ত নম্বর: <span id="final-score"></span></h3>
        <hr>
        <div id="review-container"></div>
    </div>

        const marksPerCorrect = 1;
        const penaltyPerWrong = 0.25; // 0.25 negative marking
        let timeRemaining = 30 * 60; // 30 minutes in seconds
        let timerInterval;

        // 2. Render Questions
        function loadQuestions() {
            const container = document.getElementById('questions-container');
            let html = '';

            quizData.forEach((q, index) => {
                html += `<div class="card" id="q-block-${index}">
                    <h3>প্রশ্ন ${index + 1}: ${q.question}</h3>`;
                
                // If there's a graph, render the image
                if (q.graphUrl) {
                    html += `<img src="${q.graphUrl}" alt="Graph for Question ${index + 1}" class="graph-img">`;
                }

                q.options.forEach((opt, optIndex) => {
                    html += `<label class="option-label">
                        <input type="radio" name="q${index}" value="${optIndex}">
                        ${opt}
                    </label>`;
                });
                html += `</div>`;
            });

            container.innerHTML = html;
            renderMath(); // Call KaTeX to render the math
        }

        // 3. Render Math using KaTeX
        function renderMath() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        }

        // 4. Timer Logic
        function startTimer() {
            timerInterval = setInterval(() => {
                timeRemaining--;
                let minutes = Math.floor(timeRemaining / 60);
                let seconds = timeRemaining % 60;
                document.getElementById('timer').innerText = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    submitExam(); // Auto submit when time is up
                }
            }, 1000);
        }

        // 5. Submit and Calculate Logic
        function submitExam() {
            clearInterval(timerInterval);
            document.getElementById('exam-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');

            let correctCount = 0;
            let wrongCount = 0;
            let unattemptedCount = 0;
            let reviewHtml = '';

            quizData.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                let isCorrect = false;

                reviewHtml += `<div class="card">
                    <h4>প্রশ্ন ${index + 1}: ${q.question}</h4>`;

                if (selected) {
                    const selectedVal = parseInt(selected.value);
                    if (selectedVal === q.correctAnswerIndex) {
                        correctCount++;
                        isCorrect = true;
                        reviewHtml += `<p class="correct-ans">আপনার উত্তর সঠিক: ${q.options[selectedVal]}</p>`;
                    } else {
                        wrongCount++;
                        reviewHtml += `<p class="wrong-ans">আপনার উত্তর ভুল: ${q.options[selectedVal]}</p>
                                       <p class="correct-ans">সঠিক উত্তর: ${q.options[q.correctAnswerIndex]}</p>`;
                    }
                } else {
                    unattemptedCount++;
                    reviewHtml += `<p style="color: #f39c12; font-weight:bold;">উত্তর দেওয়া হয়নি।</p>
                                   <p class="correct-ans">সঠিক উত্তর: ${q.options[q.correctAnswerIndex]}</p>`;
                }

                // Add explanation
                if (q.explanation) {
                    reviewHtml += `<div class="explanation"><strong>ব্যাখ্যা:</strong> ${q.explanation}</div>`;
                }
                reviewHtml += `</div>`;
            });

            // Calculate Scores
            const totalScore = (correctCount * marksPerCorrect) - (wrongCount * penaltyPerWrong);

            // Display Scores
            document.getElementById('total-q').innerText = quizData.length;
            document.getElementById('correct-q').innerText = correctCount;
            document.getElementById('wrong-q').innerText = wrongCount;
            document.getElementById('negative-m').innerText = (wrongCount * penaltyPerWrong).toFixed(2);
            document.getElementById('final-score').innerText = totalScore.toFixed(2) + " / " + (quizData.length * marksPerCorrect);
            
            document.getElementById('review-container').innerHTML = reviewHtml;
            renderMath(); // Render math in the review section
        }

        // Initialize on load
        window.onload = () => {
            loadQuestions();
            startTimer();
        };
    </script>
</body>
